services:
  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: eagle-net-backend
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts/models:/app/artifacts/models:ro
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: eagle-net-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend